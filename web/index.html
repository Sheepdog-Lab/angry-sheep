<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Angry Sheep</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { display: block; }
    .camera-panel {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.82);
      color: #e8e8e8;
      padding: 10px 12px;
      border-radius: 8px;
      font: 12px system-ui, -apple-system, sans-serif;
      max-width: min(300px, 42vw);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .camera-panel--collapsed {
      padding: 6px 8px;
    }
    .camera-panel--collapsed .camera-panel-body {
      display: none;
    }
    .camera-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 0;
    }
    .camera-panel:not(.camera-panel--collapsed) .camera-panel-header {
      margin-bottom: 8px;
    }
    .camera-panel-title {
      font-weight: 600;
    }
    .camera-panel-toggle {
      flex-shrink: 0;
      padding: 4px 10px;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e8e8e8;
      cursor: pointer;
    }
    .camera-panel-toggle:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    .camera-panel-toggle:focus-visible {
      outline: 2px solid #8ab4ff;
      outline-offset: 2px;
    }
    .camera-panel--collapsed .camera-panel-toggle {
      margin-left: auto;
    }
    .camera-panel label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    #cameraSelect {
      width: 100%;
      margin-bottom: 8px;
      padding: 6px 8px;
      font: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #eee;
    }
    #video {
      display: block;
      width: 100%;
      max-height: 160px;
      border-radius: 4px;
      background: #111;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="camera-panel" id="cameraPanel" aria-label="Camera preview">
    <div class="camera-panel-header">
      <span class="camera-panel-title">Camera</span>
      <button type="button" id="cameraPanelToggle" class="camera-panel-toggle" aria-expanded="true" aria-controls="camera-panel-body" title="Hide camera controls">
        Hide
      </button>
    </div>
    <div id="camera-panel-body" class="camera-panel-body">
      <label for="cameraSelect">Device</label>
      <select id="cameraSelect"></select>
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
