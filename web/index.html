<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Angry Sheep</title>
  <style>
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      width: 100vw;
      background: #050805;
    }
    body {
      position: relative;
      font-family: system-ui, -apple-system, sans-serif;
    }
    /* body.table-projection = state only (webcam CSS + pointer remap); flip is on #gameStage */
    #gameStage.table-projection-visual {
      /* 180° + vertical mirror (opposite chirality vs rotate(180) scaleX(-1) for glass / floor projection) */
      transform: rotate(180deg) scaleY(-1);
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .fullscreen-app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .game-stage {
      position: relative;
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }
    body.is-fullscreen .game-stage {
      width: min(1080px, 100vh, 100vw);
      height: min(1080px, 100vh, 100vw);
    }
    .fullscreen-launch,
    .fullscreen-exit,
    .recalibrate-button,
    .table-projection-button {
      padding: 6px 14px;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      font-weight: normal;
      letter-spacing: normal;
      text-transform: none;
      line-height: normal;
      box-shadow: none;
      min-width: 0;
      min-height: 0;
      text-align: center;
      white-space: nowrap;
    }
    .fullscreen-launch {
      position: fixed;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: 360px;
      z-index: 10050;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .fullscreen-launch:hover,
    .fullscreen-exit:hover,
    .recalibrate-button:hover,
    .table-projection-button:hover:not(.table-projection-button--on) {
      background: #444;
      border-color: #888;
    }
    .table-projection-button--on:hover {
      background: #16a34a;
      border-color: #14532d;
    }
    .fullscreen-launch:focus-visible,
    .fullscreen-exit:focus-visible,
    .recalibrate-button:focus-visible,
    .table-projection-button:focus-visible,
    .camera-panel-toggle:focus-visible,
    .camera-panel-disclose:focus-visible,
    .camera-panel-reveal:focus-visible,
    #cameraSelect:focus-visible {
      outline: 3px solid #8ab4ff;
      outline-offset: 3px;
    }
    .camera-on-off-toggle {
      flex-shrink: 0;
      padding: 4px 12px;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e8e8e8;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .camera-on-off-toggle:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    .camera-on-off-toggle[aria-pressed="true"] {
      background: #2e6b2e;
      border-color: #4a4;
      color: #d0ffd0;
    }
    .fullscreen-exit {
      display: none;
      position: fixed;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: 360px;
      z-index: 10050;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .recalibrate-button {
      display: none;
    }
    .recalibrate-button--windowed {
      position: fixed;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: 396px;
      z-index: 10050;
      pointer-events: auto;
    }
    .recalibrate-button--fullscreen {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
    }
    body[data-game-mode="physical"]:not(.is-fullscreen) .recalibrate-button--windowed {
      display: block;
    }
    body.is-fullscreen[data-game-mode="physical"] .recalibrate-button--fullscreen {
      display: block;
    }
    .fullscreen-app:fullscreen .fullscreen-exit,
    .fullscreen-app:-webkit-full-screen .fullscreen-exit {
      display: block;
    }
    body.is-fullscreen .fullscreen-launch {
      display: none;
    }
    .camera-panel {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10050;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.82);
      color: #e8e8e8;
      padding: 10px 12px;
      border-radius: 8px;
      font: 12px system-ui, -apple-system, sans-serif;
      max-width: min(300px, 42vw);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .camera-panel--collapsed {
      padding: 6px 8px;
    }
    .camera-panel--collapsed .camera-panel-body {
      display: none;
    }
    .camera-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
      width: 100%;
    }
    .camera-panel:not(.camera-panel--collapsed) .camera-panel-header {
      margin-bottom: 8px;
    }
    .camera-panel-title {
      font-weight: 600;
    }
    .camera-panel-toggle {
      flex-shrink: 0;
      padding: 4px 10px;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e8e8e8;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .camera-panel-toggle:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    .camera-panel label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    #cameraSelect {
      width: 100%;
      margin-bottom: 8px;
      padding: 6px 8px;
      font: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #eee;
    }
    #video {
      display: block;
      width: 100%;
      max-height: 160px;
      border-radius: 4px;
      background: #111;
      object-fit: cover;
    }
    /* Webcam: mirror for a natural selfie when the page is not table-corrected */
    video.webcam-feed {
      transform: scaleX(-1);
      transform-origin: center center;
    }
    /* Undo game-stage flip on the webcam preview (camera panel is not transformed) */
    body.table-projection video.webcam-feed {
      /* Keep selfie mirror, then match game-stage correction */
      transform: scaleX(-1) rotate(180deg) scaleY(-1);
      transform-origin: center center;
    }
    /* Bottom-left stack (above the facilitator HUD):
       Table Projection → Recalibrate → Full Screen, bottom-up in that order. */
    .table-projection-button {
      display: block;
      position: fixed;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: 432px;
      z-index: 10001;
      pointer-events: auto;
    }
    .table-projection-button--on {
      background: #22c55e;
      color: #052e16;
      border-color: #15803d;
    }
    body.camera-panel-hidden #cameraPanel {
      display: none !important;
    }
    .camera-panel-reveal {
      position: fixed;
      top: max(8px, env(safe-area-inset-top, 0px));
      left: max(8px, env(safe-area-inset-left, 0px));
      z-index: 10050;
      pointer-events: auto;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: rgba(0, 0, 0, 0.82);
      color: #e8e8e8;
      font: 12px system-ui, -apple-system, sans-serif;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .camera-panel-reveal:hover {
      background: rgba(30, 30, 30, 0.92);
      border-color: #666;
    }
    .camera-panel-disclose {
      flex-shrink: 0;
      margin-left: auto;
      padding: 8px 10px;
      min-height: 44px;
      min-width: 44px;
      box-sizing: border-box;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #1e1e1e;
      color: #bbb;
      cursor: pointer;
      font-size: 11px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .camera-panel-disclose:hover {
      background: #2a2a2a;
      border-color: #666;
      color: #e8e8e8;
    }
  </style>
</head>
<body>
  <button
    type="button"
    id="enterFullscreenButton"
    class="fullscreen-launch"
    aria-controls="fullscreenApp"
    title="Expand the game to full screen"
  >
    Full Screen
  </button>
  <button
    type="button"
    id="recalibrateButton"
    class="recalibrate-button recalibrate-button--windowed"
    title="Restart physical marker calibration"
  >
    Recalibrate
  </button>
  <button
    type="button"
    id="tableProjectionButton"
    class="table-projection-button"
    aria-pressed="false"
    title="Rotate and mirror only the play area (green circle) for glass-table projection"
  >
    Table Projection
    ○ OFF
  </button>
  <div id="fullscreenApp" class="fullscreen-app">
    <div id="gameStage" class="game-stage" aria-label="Angry Sheep game area"></div>
    <button
      type="button"
      id="exitFullscreenButton"
      class="fullscreen-exit"
      title="Exit full screen"
    >
      Exit Full Screen
    </button>
    <button
      type="button"
      id="recalibrateFullscreenButton"
      class="recalibrate-button recalibrate-button--fullscreen"
      title="Restart physical marker calibration"
    >
      Recalibrate
    </button>
  </div>
  <button
    type="button"
    id="cameraPanelReveal"
    class="camera-panel-reveal"
    hidden
    aria-controls="cameraPanel"
    title="Show camera window"
  >
    Camera
  </button>
  <div class="camera-panel" id="cameraPanel" aria-label="Camera preview">
    <div class="camera-panel-header">
      <button type="button" id="cameraToggle" class="camera-on-off-toggle" aria-pressed="false" title="Turn camera on or off">Camera Off</button>
      <button type="button" id="cameraPanelToggle" class="camera-panel-toggle" aria-expanded="true" aria-controls="camera-panel-body" title="Hide device list and preview">
        Hide
      </button>
      <button
        type="button"
        id="cameraPanelDisclose"
        class="camera-panel-disclose"
        aria-expanded="true"
        aria-controls="cameraPanel"
        title="Hide camera window (use Camera chip to show again)"
      >
        Hide window
      </button>
    </div>
    <div id="camera-panel-body" class="camera-panel-body">
      <label for="cameraSelect">Device</label>
      <select id="cameraSelect"></select>
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
