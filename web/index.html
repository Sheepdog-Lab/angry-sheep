<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Angry Sheep</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: #050805;
    }
    body {
      position: relative;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body.floor-projected {
      transform: rotate(180deg);
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .fullscreen-app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .game-stage {
      position: relative;
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }
    body.is-fullscreen .game-stage {
      width: min(1080px, 100vh, 100vw);
      height: min(1080px, 100vh, 100vw);
    }
    .fullscreen-launch,
    .fullscreen-exit,
    .recalibrate-button {
      border: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      color: #0c160a;
      cursor: pointer;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.45);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .fullscreen-launch {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10001;
      width: 148px;
      height: 148px;
      padding: 16px;
      font-size: 1.4rem;
      line-height: 1.05;
      text-transform: uppercase;
    }
    .fullscreen-launch:hover,
    .fullscreen-exit:hover,
    .recalibrate-button:hover {
      background: #ffffff;
    }
    .fullscreen-launch:focus-visible,
    .fullscreen-exit:focus-visible,
    .recalibrate-button:focus-visible,
    .camera-panel-toggle:focus-visible,
    #cameraSelect:focus-visible {
      outline: 3px solid #8ab4ff;
      outline-offset: 3px;
    }
    .camera-on-off-toggle {
      flex-shrink: 0;
      padding: 4px 12px;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e8e8e8;
      cursor: pointer;
    }
    .camera-on-off-toggle:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    .camera-on-off-toggle[aria-pressed="true"] {
      background: #2e6b2e;
      border-color: #4a4;
      color: #d0ffd0;
    }
    .fullscreen-exit {
      display: none;
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10001;
      min-width: 140px;
      min-height: 64px;
      padding: 14px 18px;
      font-size: 1rem;
      text-transform: uppercase;
    }
    .recalibrate-button {
      display: none;
      min-width: 160px;
      min-height: 56px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .recalibrate-button--windowed {
      position: fixed;
      right: 24px;
      bottom: 188px;
      z-index: 10001;
    }
    .recalibrate-button--fullscreen {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 5;
    }
    body[data-game-mode="physical"]:not(.is-fullscreen) .recalibrate-button--windowed {
      display: block;
    }
    body.is-fullscreen[data-game-mode="physical"] .recalibrate-button--fullscreen {
      display: block;
    }
    .fullscreen-app:fullscreen .fullscreen-exit,
    .fullscreen-app:-webkit-full-screen .fullscreen-exit {
      display: block;
    }
    body.is-fullscreen .fullscreen-launch {
      display: none;
    }
    .camera-panel {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.82);
      color: #e8e8e8;
      padding: 10px 12px;
      border-radius: 8px;
      font: 12px system-ui, -apple-system, sans-serif;
      max-width: min(300px, 42vw);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .camera-panel--collapsed {
      padding: 6px 8px;
    }
    .camera-panel--collapsed .camera-panel-body {
      display: none;
    }
    .camera-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    .camera-panel:not(.camera-panel--collapsed) .camera-panel-header {
      margin-bottom: 8px;
    }
    .camera-panel-title {
      font-weight: 600;
    }
    .camera-panel-toggle {
      flex-shrink: 0;
      padding: 4px 10px;
      font: inherit;
      line-height: 1.2;
      border-radius: 6px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e8e8e8;
      cursor: pointer;
    }
    .camera-panel-toggle:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    .camera-panel label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    #cameraSelect {
      width: 100%;
      margin-bottom: 8px;
      padding: 6px 8px;
      font: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #eee;
    }
    #video {
      display: block;
      width: 100%;
      max-height: 160px;
      border-radius: 4px;
      background: #111;
      object-fit: cover;
    }
    video.webcam-feed {
      transform: scaleX(-1);
      transform-origin: center center;
    }
    body.floor-projected video.webcam-feed {
      transform: rotate(180deg) scaleX(-1);
      transform-origin: center center;
    }
    .calibration-key {
      position: fixed;
      left: 16px;
      bottom: 52px;
      z-index: 9999;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.78);
      color: #f0f0f0;
      font: 12px/1.45 system-ui, -apple-system, sans-serif;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      max-width: min(280px, 36vw);
      pointer-events: none;
      white-space: pre-line;
    }
    .calibration-key strong {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button
    type="button"
    id="enterFullscreenButton"
    class="fullscreen-launch"
    aria-controls="fullscreenApp"
    title="Expand the game to full screen"
  >
    Full
    <br />
    Screen
  </button>
  <button
    type="button"
    id="recalibrateButton"
    class="recalibrate-button recalibrate-button--windowed"
    title="Restart physical marker calibration"
  >
    Recalibrate
  </button>
  <div id="fullscreenApp" class="fullscreen-app">
    <div id="gameStage" class="game-stage" aria-label="Angry Sheep game area"></div>
    <div class="calibration-key" aria-label="Marker calibration controls">
      <strong>Marker Calibration</strong>
      C: capture next homography corner
      Order: top, right,
      bottom, left
      X / Y: flip physical markers
      Dots 1-4: target top/right/bottom/left
    </div>
    <button
      type="button"
      id="exitFullscreenButton"
      class="fullscreen-exit"
      title="Exit full screen"
    >
      Exit Full Screen
    </button>
    <button
      type="button"
      id="recalibrateFullscreenButton"
      class="recalibrate-button recalibrate-button--fullscreen"
      title="Restart physical marker calibration"
    >
      Recalibrate
    </button>
  </div>
  <div class="camera-panel" id="cameraPanel" aria-label="Camera preview">
    <div class="camera-panel-header">
      <button type="button" id="cameraToggle" class="camera-on-off-toggle" aria-pressed="false" title="Turn camera on or off">Camera Off</button>
      <button type="button" id="floorProjectionToggle" class="camera-on-off-toggle" aria-pressed="false" title="Toggle floor projection rotation">Floor Projection: Off</button>
      <button type="button" id="cameraPanelToggle" class="camera-panel-toggle" aria-expanded="true" aria-controls="camera-panel-body" title="Hide camera controls">
        Hide
      </button>
    </div>
    <div id="camera-panel-body" class="camera-panel-body">
      <label for="cameraSelect">Device</label>
      <select id="cameraSelect"></select>
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
